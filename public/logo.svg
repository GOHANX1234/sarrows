<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FF2535"/>
      <stop offset="100%" stop-color="#BF000A"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="40" height="40" rx="9" fill="url(#bg)"/>
  <!-- Top highlight -->
  <rect width="40" height="40" rx="9" fill="url(#shine)"/>

  <!-- Top right-pointing chevron -->
  <polyline points="8,10 21,17 8,24"
    stroke="white" stroke-width="3.8" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Bottom left-pointing chevron -->
  <polyline points="32,17 19,24 32,31"
    stroke="white" stroke-width="3.8" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
